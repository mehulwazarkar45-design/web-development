<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personal Finance Tracker</title>
  <style>
    :root{
      --bg1:#0b1220;
      --bg2:#1e293b;
      --card: rgba(255,255,255,.08);
      --card-border: rgba(148,163,184,.25);
      --text:#e2e8f0;
      --muted:#94a3b8;
      --accent:#38bdf8;
      --primary:#0ea5e9;
      --danger:#ef4444;
      --success:#22c55e;
      --row:#0f172a;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      background: radial-gradient(1200px 800px at 20% -10%, rgba(56,189,248,.35), transparent 50%),
                  radial-gradient(900px 700px at 90% 0%, rgba(124,58,237,.25), transparent 45%),
                  linear-gradient(135deg, #0b1220 0%, #111827 50%, #0b1220 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .app{
      width: min(1100px, 92vw);
      margin: 32px auto 56px;
    }

    .header{
      text-align:center;
      margin-bottom: 18px;
    }

    .header h1{
      margin:0;
      font-size: 2rem;
      letter-spacing: .2px;
    }

    .subtitle{
      margin: 8px 0 0;
      color: var(--muted);
    }

    .card{
      background: var(--card);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 18px 50px rgba(0,0,0,.25);
    }

    h2{
      margin: 0 0 12px;
      font-size: 1.25rem;
      color: #e0f2fe;
    }

    .form{margin-top: 10px;}

    .form-grid{
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .field{display:flex; flex-direction:column; gap:8px;}
    .field-full{grid-column: 1 / -1;}

    label{
      font-size: .9rem;
      color: var(--muted);
    }

    input, select, textarea{
      width: 100%;
      border-radius: 10px;
      border: 1px solid rgba(148,163,184,.25);
      background: rgba(2,6,23,.55);
      color: var(--text);
      padding: 10px 12px;
      outline: none;
    }

    input:focus, select:focus, textarea:focus{
      border-color: rgba(56,189,248,.55);
      box-shadow: 0 0 0 3px rgba(56,189,248,.12);
    }

    .radio-group{display:flex; gap: 10px; align-items:center; flex-wrap:wrap; margin-top: 6px;}
    .radio{
      display:flex;
      gap:8px;
      align-items:center;
      color: var(--text);
      font-size: .95rem;
      padding: 8px 10px;
      border: 1px solid rgba(148,163,184,.25);
      border-radius: 999px;
      background: rgba(2,6,23,.45);
      cursor: pointer;
      min-width: 96px;
      justify-content: center;
    }
    .radio:hover{border-color: rgba(56,189,248,.45); background: rgba(56,189,248,.12);}
    .radio input{width: auto; accent-color: var(--accent);}

    .form-actions{
      display:flex;
      gap: 10px;
      margin-top: 14px;
      justify-content:flex-end;
      flex-wrap: wrap;
    }

    button{
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 700;
    }

    .primary{background: linear-gradient(135deg, var(--primary) 0%, #0284c7 100%); color: #041018;}
    .danger{background: rgba(239,68,68,.18); color: #fecaca; border: 1px solid rgba(239,68,68,.35);}

    .primary:hover{filter: brightness(1.05)}
    .danger:hover{background: rgba(239,68,68,.26)}

    .filters{
      display:flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .table-wrap{
      overflow:auto;
      border-radius: 12px;
      border: 1px solid rgba(148,163,184,.2);
    }

    table{
      width: 100%;
      border-collapse: collapse;
      min-width: 640px;
      background: rgba(2,6,23,.35);
    }

    th, td{
      padding: 12px 10px;
      border-bottom: 1px solid rgba(148,163,184,.18);
      text-align:left;
    }

    th{
      background: rgba(56,189,248,.12);
      color: #e0f2fe;
      font-weight: 800;
      position: sticky;
      top: 0;
    }

    tbody tr:nth-child(even){
      background: rgba(15,23,42,.35);
    }

    .amount-income{color: var(--success); font-weight: 800;}
    .amount-expense{color: #fb7185; font-weight: 800;}

    .summary{
      display:grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin-top: 14px;
    }

    .summary-item{
      background: rgba(2,6,23,.25);
      border: 1px solid rgba(148,163,184,.18);
      border-radius: 12px;
      padding: 14px;
    }

    .summary-item .label{color: var(--muted); font-weight: 700; margin-bottom: 6px;}
    .summary-item .value{font-size: 1.25rem; font-weight: 900;}
    .hint{color: var(--muted); font-size: .9rem; margin-top: 6px;}

    .footer{margin-top: 14px; text-align:center; color: var(--muted);}

    @media (max-width: 860px){
      .form-grid{grid-template-columns:1fr;}
      .summary{grid-template-columns:1fr;}
    }

    @media print {
      body{
        background: #fff;
        color: #000;
      }

      .app{
        width: 100%;
        margin: 0;
      }

      .card{
        background: #fff;
        box-shadow: none;
        border: 1px solid #ccc;
        color: #000;
      }

      .form, .filters, .form-actions, .footer{
        display: none !important;
      }

      .summary{
        grid-template-columns: 1fr 1fr 1fr;
      }

      table{
        min-width: 0;
        background: #fff;
      }

      th, td{
        color: #000;
        border-bottom: 1px solid #ccc;
      }

      th{
        background: #f5f5f5;
      }

      .amount-income{color: #166534;}
      .amount-expense{color: #991b1b;}
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>Personal Finance Tracker</h1>
      <p class="subtitle">Track income & expenses. Data persists in your browser.</p>
    </header>

    <section class="card">
      <h2>Add Transaction</h2>

      <form id="form" class="form" autocomplete="off">
        <div class="form-grid">
          <div class="field">
            <label for="amount">Amount</label>
            <input id="amount" name="amount" type="number" step="0.01" min="0" required placeholder="e.g. 2500" />
            <div class="radio-group" role="group" aria-label="Transaction type">
              <label class="radio"><input type="radio" name="type" value="income" checked /> <span>Income</span></label>
              <label class="radio"><input type="radio" name="type" value="expense" /> <span>Expense</span></label>
            </div>
          </div>

          <div class="field">
            <label for="category">Category</label>
            <select id="category" name="category">
              <option value="Rent">Rent</option>
              <option value="Groceries">Groceries</option>
              <option value="Utilities">Utilities</option>
              <option value="Transport">Transport</option>
              <option value="Health">Health</option>
              <option value="Entertainment">Entertainment</option>
              <option value="Salary">Salary</option>
              <option value="Freelance">Freelance</option>
              <option value="other">Other</option>
            </select>
          </div>

          <div class="field">
            <label for="date">Date</label>
            <input id="date" name="date" type="date" required />
          </div>

          <div class="field field-full">
            <label for="description">Description</label>
            <textarea id="description" name="description" rows="3" placeholder="Optional details"></textarea>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="primary">Add Transaction</button>
          <button type="button" onclick="window.print()" class="primary">Print</button>
          <button type="button" id="clearAll" class="danger">Clear All</button>
        </div>
      </form>
    </section>

    <section class="card">
      <div class="filters">
        <div class="field">
          <label for="categoryFilter">Filter by Category</label>
          <select id="categoryFilter">
            <option value="all" selected>All categories</option>
          </select>
        </div>

        <div class="field">
          <label for="rangeFilter">Filter by Time Range</label>
          <select id="rangeFilter">
            <option value="all" selected>All time</option>
            <option value="lastWeek">Last week</option>
            <option value="thisMonth">This month</option>
            <option value="thisYear">This year</option>
          </select>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Category</th>
              <th>Amount</th>
              <th>Description</th>
            </tr>
          </thead>
          <tbody id="transactionsBody"></tbody>
        </table>
      </div>

      <div class="summary">
        <div class="summary-item">
          <div class="label">Total Income</div>
          <div class="value" id="totalIncome">$0.00</div>
        </div>
        <div class="summary-item">
          <div class="label">Total Expenses</div>
          <div class="value" id="totalExpenses">$0.00</div>
        </div>
        <div class="summary-item">
          <div class="label">Balance</div>
          <div class="value" id="balance">$0.00</div>
          <div class="hint" id="balanceHint"></div>
        </div>
      </div>
    </section>

    <footer class="footer">
      <small>Tip: Expenses are shown in red, income in green.</small>
    </footer>
  </div>

  <script>
    const STORAGE_KEY = 'financeTracker.transactions.v1';

    let transactions = [];

    const $ = (id) => document.getElementById(id);

    function safeNumber(v){
      const n = Number(v);
      return Number.isFinite(n) ? n : 0;
    }

    function loadTransactions(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        if(!raw) return [];
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : [];
      }catch{
        return [];
      }
    }

    function saveTransactions(){
      localStorage.setItem(STORAGE_KEY, JSON.stringify(transactions));
    }

    function getSelectedCategory(){
      return $('categoryFilter').value;
    }

    function getSelectedRange(){
      return $('rangeFilter').value;
    }

    function matchesRange(transaction){
      const range = getSelectedRange();
      if(range === 'all') return true;

      const tDate = new Date(transaction.date + 'T00:00:00');
      const now = new Date();

      if(!(tDate instanceof Date) || isNaN(tDate)) return false;

      if(range === 'lastWeek'){
        const ms = 7 * 24 * 60 * 60 * 1000;
        return tDate.getTime() >= (now.getTime() - ms);
      }

      if(range === 'thisMonth'){
        return tDate.getFullYear() === now.getFullYear() && tDate.getMonth() === now.getMonth();
      }

      if(range === 'thisYear'){
        return tDate.getFullYear() === now.getFullYear();
      }

      return true;
    }

    function getFilteredTransactions(){
      const cat = getSelectedCategory();
      return transactions.filter(t => {
        const catOk = (cat === 'all') ? true : t.category === cat;
        const rangeOk = matchesRange(t);
        return catOk && rangeOk;
      });
    }

    function updateCategoryFilterOptions(){
      const catSelect = $('categoryFilter');
      const current = catSelect.value;

      const categories = Array.from(new Set(transactions.map(t => t.category))).sort((a,b)=>a.localeCompare(b));

      catSelect.innerHTML = `<option value="all" ${current==='all'?'selected':''}>All categories</option>`;
      for(const c of categories){
        const opt = document.createElement('option');
        opt.value = c;
        opt.textContent = c;
        if(c === current) opt.selected = true;
        catSelect.appendChild(opt);
      }
    }

    function escapeHtml(str){
      return String(str)
        .replaceAll('&','&amp;')
        .replaceAll('<','<')
        .replaceAll('>','>')
        .replaceAll('"','"')
        .replaceAll("'",'&#039;');
    }

    function updateSummary(filteredTx){
      const income = filteredTx.reduce((sum,t)=> t.type==='income' ? sum + Math.abs(safeNumber(t.amount)) : sum, 0);
      const expenses = filteredTx.reduce((sum,t)=> t.type==='expense' ? sum + Math.abs(safeNumber(t.amount)) : sum, 0);
      const balance = income - expenses;

      $('totalIncome').textContent = `$${income.toFixed(2)}`;
      $('totalExpenses').textContent = `$${expenses.toFixed(2)}`;

      const balanceEl = $('balance');
      const hintEl = $('balanceHint');

      if(balance > 0){
        balanceEl.style.color = 'var(--success)';
        hintEl.textContent = '(Surplus)';
      } else if(balance < 0){
        balanceEl.style.color = '#fb7185';
        hintEl.textContent = '(Deficit)';
      } else {
        balanceEl.style.color = '';
        hintEl.textContent = '';
      }

      balanceEl.textContent = `$${balance.toFixed(2)}`;
    }

    function updateTableAndSummary(){
      const tbody = $('transactionsBody');
      tbody.innerHTML = '';

      const filtered = getFilteredTransactions();
      filtered.sort((a,b)=> (new Date(b.date) - new Date(a.date)));

      if(filtered.length === 0){
        const tr = document.createElement('tr');
        tr.innerHTML = `<td colspan="4" style="color: var(--muted);">No transactions match the selected filters.</td>`;
        tbody.appendChild(tr);
      } else {
        for(const t of filtered){
          const tr = document.createElement('tr');
          const amountClass = t.type === 'income' ? 'amount-income' : 'amount-expense';
          const signedAmount = t.type === 'income' ? Math.abs(t.amount) : -Math.abs(t.amount);

          tr.innerHTML = `
            <td>${escapeHtml(t.date)}</td>
            <td>${escapeHtml(t.category)}</td>
            <td class="${amountClass}">${signedAmount.toFixed(2)}</td>
            <td>${escapeHtml(t.description || '')}</td>
          `;
          tbody.appendChild(tr);
        }
      }

      updateSummary(filtered);
    }

    function addTransaction(amount, type, category, date, description){
      const tx = {
        id: (crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + '_' + Math.random().toString(16).slice(2)),
        amount: safeNumber(amount),
        type,
        category,
        date,
        description: (description || '').trim()
      };

      transactions.push(tx);
      saveTransactions();
      updateCategoryFilterOptions();
      updateTableAndSummary();
    }

    function init(){
      // Default date = today
      const dateInput = $('date');
      if(dateInput){
        const now = new Date();
        const yyyy = now.getFullYear();
        const mm = String(now.getMonth()+1).padStart(2,'0');
        const dd = String(now.getDate()).padStart(2,'0');
        dateInput.value = `${yyyy}-${mm}-${dd}`;
      }

      transactions = loadTransactions();
      updateCategoryFilterOptions();
      updateTableAndSummary();

      $('form').addEventListener('submit', (e)=>{
        e.preventDefault();

        const amount = $('amount').value;
        const typeRadio = e.target.elements['type'];
        let selectedType = 'income';
        for(let i=0;i<typeRadio.length;i++){
          if(typeRadio[i].checked){
            selectedType = typeRadio[i].value;
            break;
          }
        }

        const category = ($('category').value || '');
        if(!category){
          alert('Select a category.');
          return;
        }
        const date = $('date').value;
        const description = $('description').value;

        const amountNum = Number(amount);
        if(!Number.isFinite(amountNum) || amountNum <= 0){
          alert('Enter a valid positive amount.');
          return;
        }
        if(!category){
          alert('Select a category.');
          return;
        }
        if(!date){
          alert('Select a date.');
          return;
        }

        addTransaction(amountNum, selectedType, category, date, description);
        e.target.reset();

        // Restore default date after reset
        const now = new Date();
        const yyyy = now.getFullYear();
        const mm = String(now.getMonth()+1).padStart(2,'0');
        const dd = String(now.getDate()).padStart(2,'0');
        $('date').value = `${yyyy}-${mm}-${dd}`;
      });

      $('categoryFilter').addEventListener('change', updateTableAndSummary);
      $('rangeFilter').addEventListener('change', updateTableAndSummary);

      $('clearAll').addEventListener('click', ()=>{
        const ok = confirm('Clear all saved transactions? This cannot be undone.');
        if(!ok) return;
        transactions = [];
        saveTransactions();
        updateCategoryFilterOptions();
        updateTableAndSummary();
      });
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
